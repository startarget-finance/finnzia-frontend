<div class="min-h-screen bg-[#F8FAFC] pb-12 font-sans flex flex-col">
  <!-- Cabeçalho + período compacto -->
  <div class="relative z-[300] bg-white/80 backdrop-blur supports-[backdrop-filter]:bg-white/60 border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-5">
    <div class="mx-auto w-full max-w-[1800px] flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
      <div class="flex items-start gap-4 min-w-0">
        <div class="mt-0.5 flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-sm ring-1 ring-black/5">
          <i class="fi fi-rr-chart-line-up text-[1rem] leading-none" aria-hidden="true"></i>
        </div>
        <div class="min-w-0">
          <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Demonstrativo de Fluxo de Caixa</h1>
          <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1">
            <span class="inline-flex items-center rounded-full border border-gray-200 bg-gray-50 px-2 py-0.5 text-[11px] font-semibold text-gray-600">
              <span class="text-gray-400 mr-1.5">Período</span>
              <ng-container *ngIf="dataInicial && dataFinal; else periodoBadgePlaceholder">
                {{ (dataInicial + 'T00:00:00' | date:'dd/MM/yyyy') }} — {{ (dataFinal + 'T00:00:00' | date:'dd/MM/yyyy') }}
              </ng-container>
              <ng-template #periodoBadgePlaceholder>não selecionado</ng-template>
            </span>
          </div>
        </div>
      </div>

      <div [formGroup]="filtrosForm" class="flex flex-wrap items-center gap-2 lg:justify-end lg:pt-1">
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(3)">3M</button>
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(6)">6M</button>
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(12)">12M</button>
        <app-periodo-range-picker
          #periodoPicker
          [(dataInicial)]="dataInicial"
          [(dataFinal)]="dataFinal"
          [showLabel]="false"
          placeholder="Alterar período"
          [preloadOnOpen]="false"
          wrapperClass="relative z-[9999]"
          (applied)="onPeriodoAplicado($event)"
          (cleared)="onPeriodoLimpar()"
        >
          <button
            periodoTrigger
            #periodoTrigger
            type="button"
            (click)="periodoPicker.toggle()"
            class="inline-flex items-center gap-2 rounded-xl border border-gray-300 bg-white px-3.5 py-2 text-sm text-gray-700 hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500 transition-all shadow-sm"
          >
            <i class="fi fi-rr-calendar shrink-0 text-[0.9rem] leading-none text-gray-400" aria-hidden="true"></i>
            <span class="max-w-[220px] truncate font-medium sm:max-w-none">{{ periodoPicker.displayLabel }}</span>
            <i class="fi fi-rr-angle-small-down flex h-4 w-4 shrink-0 items-center justify-center text-[0.85rem] leading-none text-gray-400" aria-hidden="true"></i>
          </button>
        </app-periodo-range-picker>
      </div>
    </div>
  </div>

  <div class="mx-auto w-full max-w-[1800px] px-4 sm:px-6 lg:px-8 mt-6 flex-1 min-h-0 flex flex-col gap-6">
    <!-- Error State -->
    <div *ngIf="erro" class="bg-rose-50 border border-rose-200 rounded-2xl p-5 flex items-start gap-4">
      <div class="mt-0.5 shrink-0 rounded-full bg-rose-100 p-2">
        <i class="fi fi-rr-triangle-warning text-[1rem] leading-none text-rose-600" aria-hidden="true"></i>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-rose-800">Não foi possível carregar os dados</h3>
        <p class="text-sm text-rose-600 mt-1">{{ erro }}</p>
      </div>
    </div>

    <div class="relative z-10 bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden p-4 sm:p-5">
      <app-dfc-planilha
        [dfcDados]="dfcResposta"
        [carregandoExterno]="carregando"
        [mesesSelecionados]="mesesSelecionadosFiltro"
        (atualizarDados)="atualizarDfcAgora()"
        (filtrarMesAno)="filtrarPorMesAno($event)"
      />
    </div>
  </div>
</div>
