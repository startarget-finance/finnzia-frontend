<div class="min-h-screen bg-[#F8FAFC] pb-12 font-sans flex flex-col">
  <!-- Cabeçalho + período compacto -->
  <div class="relative z-20 bg-white/80 backdrop-blur supports-[backdrop-filter]:bg-white/60 border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-5">
    <div class="mx-auto w-full max-w-[1800px] flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
      <div class="flex items-start gap-4 min-w-0">
        <div class="mt-0.5 flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-sm ring-1 ring-black/5">
          <i class="fi fi-rr-chart-line-up text-[1rem] leading-none" aria-hidden="true"></i>
        </div>
        <div class="min-w-0">
          <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Demonstrativo de Fluxo de Caixa</h1>
          <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1">
            <span class="inline-flex items-center rounded-full border border-gray-200 bg-gray-50 px-2 py-0.5 text-[11px] font-semibold text-gray-600">
              <span class="text-gray-400 mr-1.5">Período</span>
              <ng-container *ngIf="dataInicial && dataFinal; else periodoBadgePlaceholder">
                {{ (dataInicial + 'T00:00:00' | date:'dd/MM/yyyy') }} — {{ (dataFinal + 'T00:00:00' | date:'dd/MM/yyyy') }}
              </ng-container>
              <ng-template #periodoBadgePlaceholder>não selecionado</ng-template>
            </span>
          </div>
        </div>
      </div>

      <div [formGroup]="filtrosForm" class="flex flex-wrap items-center gap-2 lg:justify-end lg:pt-1">
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(3)">3M</button>
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(6)">6M</button>
        <button type="button" class="px-3 py-2 text-xs font-semibold border border-gray-200 rounded-xl hover:border-violet-400 hover:text-violet-800 transition-colors bg-white text-gray-700 shadow-sm" (click)="ajustarPeriodo(12)">12M</button>
        <div class="relative z-[999]">
          <button
            type="button"
            (click)="toggleRangePicker()"
            class="inline-flex items-center gap-2 rounded-xl border border-gray-300 bg-white px-3.5 py-2 text-sm text-gray-700 hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500 transition-all shadow-sm"
          >
            <i class="fi fi-rr-calendar text-[0.9rem] leading-none text-gray-400 shrink-0" aria-hidden="true"></i>
            <span class="font-medium truncate max-w-[220px] sm:max-w-none">
              <ng-container *ngIf="dataInicial && dataFinal; else placeholderPeriodoHeader">
                {{ dataInicial === dataFinal
                    ? (dataInicial + 'T00:00:00' | date:'dd/MM/yyyy')
                    : (dataInicial + 'T00:00:00' | date:'dd/MM/yyyy') + ' até ' + (dataFinal + 'T00:00:00' | date:'dd/MM/yyyy') }}
              </ng-container>
              <ng-template #placeholderPeriodoHeader>Alterar período</ng-template>
            </span>
            <i class="fi fi-rr-angle-small-down w-4 h-4 text-gray-400 shrink-0 flex items-center justify-center text-[0.85rem] leading-none" aria-hidden="true"></i>
          </button>

          <div *ngIf="mostrarRangePicker"
               class="absolute mt-2 right-0 lg:left-0 lg:right-auto bg-white border border-gray-200 rounded-2xl shadow-2xl shadow-slate-900/20 p-4 w-[340px] max-h-[400px] overflow-y-auto ring-1 ring-black/5"
               style="z-index: 9999;">
            <div class="flex items-center justify-between mb-4">
              <button type="button" (click)="prevMonth()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 transition-colors">
                <i class="fi fi-rr-angle-small-left w-5 h-5 flex items-center justify-center text-[1rem] leading-none" aria-hidden="true"></i>
              </button>
              <div class="text-sm font-bold text-gray-900 capitalize">{{ getMonthYearLabel() }}</div>
              <button type="button" (click)="nextMonth()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 transition-colors">
                <i class="fi fi-rr-angle-small-right w-5 h-5 flex items-center justify-center text-[1rem] leading-none" aria-hidden="true"></i>
              </button>
            </div>

            <div class="grid grid-cols-7 text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-2">
              <div class="text-center">dom</div><div class="text-center">seg</div><div class="text-center">ter</div>
              <div class="text-center">qua</div><div class="text-center">qui</div><div class="text-center">sex</div><div class="text-center">sáb</div>
            </div>

            <div class="grid grid-cols-7 gap-1">
              <ng-container *ngFor="let d of calendarDays">
                <button
                  type="button"
                  [disabled]="!d.inCurrentMonth"
                  (click)="onSelectDate(d.dateStr)"
                  (mouseenter)="onHoverDate(d.dateStr)"
                  (mouseleave)="onHoverDate(null)"
                  [class.opacity-30]="!d.inCurrentMonth"
                  [class.bg-violet-600]="isStart(d.dateStr) || isEnd(d.dateStr)"
                  [class.text-white]="isStart(d.dateStr) || isEnd(d.dateStr)"
                  [class.font-semibold]="isStart(d.dateStr) || isEnd(d.dateStr)"
                  [class.bg-violet-50]="isBetween(d.dateStr)"
                  [class.text-violet-700]="isBetween(d.dateStr)"
                  class="text-sm text-gray-700 rounded-lg py-2 hover:bg-gray-100 transition-colors disabled:cursor-not-allowed"
                >
                  {{ d.day }}
                </button>
              </ng-container>
            </div>

            <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
              <button type="button" (click)="clearRange()" class="text-xs font-medium text-gray-500 hover:text-gray-900 transition-colors">Limpar</button>
              <div class="flex gap-2">
                <button type="button" (click)="cancelRangePicker()" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50 transition-colors">Cancelar</button>
                <button type="button" (click)="applyRangePicker()" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-gray-900 text-white hover:bg-gray-800 shadow-sm transition-colors">Aplicar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mx-auto w-full max-w-[1800px] px-4 sm:px-6 lg:px-8 mt-6 flex-1 min-h-0 flex flex-col gap-6">
    <!-- Error State -->
    <div *ngIf="erro" class="bg-rose-50 border border-rose-200 rounded-2xl p-5 flex items-start gap-4">
      <div class="mt-0.5 shrink-0 rounded-full bg-rose-100 p-2">
        <i class="fi fi-rr-triangle-warning text-[1rem] leading-none text-rose-600" aria-hidden="true"></i>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-rose-800">Não foi possível carregar os dados</h3>
        <p class="text-sm text-rose-600 mt-1">{{ erro }}</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden p-4 sm:p-5">
      <app-dfc-planilha
        [bomControleDfc]="dfcResposta"
        [carregandoExterno]="carregando"
        [mesesSelecionados]="mesesSelecionadosFiltro"
        (usarDfcPadrao)="resetarPeriodo()"
        (importarDoBomControle)="recarregarDfcDoBomControle()"
        (filtrarMesAno)="filtrarPorMesAno($event)"
      />
    </div>
  </div>
</div>
